name: CRM Deals vs Expiring Leases Audit

on:
  schedule:
    - cron: '30 13 * * *'  # 8:30 AM EST / 9:30 AM EDT daily
  workflow_dispatch:        # Manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Deals vs Expiring Leases Audit
        env:
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_CRM_REFRESH_TOKEN: ${{ secrets.ZOHO_CRM_REFRESH_TOKEN }}
        run: python scripts/deals_lease_audit.py

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: deals-lease-audit-report
          path: report_deals_lease_*.txt
          retention-days: 30
